<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vista previa — Pin Samuel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1a202c;
            font-family: sans-serif;
            gap: 24px;
        }
        #pin-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #etiqueta {
            color: #a0aec0;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div id="pin-container">
        <svg id="pin" xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 100 120" width="160" height="192"
             color="#4CAF50">

            <!-- Cara izquierda — opacidad 0.9 -->
            <path
                d="M50 5
                   C28 5 10 23 10 45
                   C10 72 50 115 50 115
                   L50 45
                   C50 23 50 5 50 5 Z"
                fill="currentColor"
                opacity="0.9"
            />

            <!-- Cara derecha — opacidad 1 -->
            <path
                d="M50 5
                   C72 5 90 23 90 45
                   C90 72 50 115 50 115
                   L50 45
                   C50 23 50 5 50 5 Z"
                fill="currentColor"
                opacity="1"
            />

            <!-- Círculo blanco interior -->
            <circle cx="50" cy="45" r="25" fill="white" />

            <!-- Texto de existencias -->
            <text
                x="50" y="48"
                text-anchor="middle"
                dominant-baseline="middle"
                font-size="24"
                font-family="sans-serif"
                fill="black">
                120
            </text>
        </svg>
    </div>

    <span id="etiqueta">Verde · Rojo · Gris</span>

    <script>
        const colores = [
            { hex: '#38a169', nombre: 'Verde  — cobertura ≥ 0.75' },
            { hex: '#e53e3e', nombre: 'Rojo   — cobertura < 0.50' },
            { hex: '#ecc94b', nombre: 'Amarillo — cobertura 0.50–0.74' },
            { hex: '#4a5568', nombre: 'Gris   — sin demanda' },
            { hex: '#007cbf', nombre: 'Azul   — sin medicamento' }
        ];

        const pin      = document.getElementById('pin');
        const etiqueta = document.getElementById('etiqueta');
        let idx = 0;

        function cambiarColor() {
            idx = (idx + 1) % colores.length;
            pin.style.color = colores[idx].hex;
            etiqueta.textContent = colores[idx].nombre;
        }

        setInterval(cambiarColor, 2000);
    </script>
</body>
</html>
